<!DOCTYPE html>
<html>
<head>
<title>Daily Quote</title>

<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

img{
    max-width:90%;
    max-height:90%;
}
</style>

</head>

<body>

<img id="quote">

<script>

const quotes = [
"quotes/quote1.png",
"quotes/quote2.png",
"quotes/quote3.png",
"quotes/quote4.png"
];

const day = Math.floor(Date.now() / 86400000);
const todayQuote = quotes[day % quotes.length];

document.getElementById("quote").src = todayQuote;

</script>

</body>
</html>
