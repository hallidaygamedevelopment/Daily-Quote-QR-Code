<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Quote</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }
  </style>
</head>
<body>

<img id="quote" alt="Daily Quote">

<script>
const username = "hallidaygamedevelopment"; // Your GitHub username
const repo = "Daily-Quote-QR-Code";        // Your repository name
const folder = "quotes";                   // Folder name with images

// Shuffle function (Fisher-Yates)
function shuffle(array) {
  let m = array.length, t, i;
  while (m) {
    i = Math.floor(Math.random() * m--);
    t = array[m];
    array[m] = array[i];
    array[i] = t;
  }
  return array;
}

fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}`)
  .then(res => res.json())
  .then(data => {
    // Filter only image files
    const images = data
      .filter(f => /\.(png|jpg|jpeg)$/i.test(f.name))
      .map(f => f.download_url);

    if(images.length === 0) {
      console.error("No images found in the folder!");
      return;
    }

    // Shuffle the array once
    const shuffled = shuffle(images.slice());

    // Pick today's image without repeating until all images are shown
    const day = Math.floor(Date.now() / 86400000);
    const todayQuote = shuffled[day % shuffled.length];

    document.getElementById("quote").src = todayQuote;
  })
  .catch(err => console.error("Error fetching quotes:", err));
</script>

</body>
</html>
